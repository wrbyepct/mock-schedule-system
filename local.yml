services:
  db:
    image: postgres:15-bookworm
    container_name: schedule_db
    env_file:
      - ./.envs/local/db.env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schedule_app -d schedule_system"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  db_data:
